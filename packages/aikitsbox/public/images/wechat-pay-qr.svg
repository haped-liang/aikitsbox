<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 340" width="320" height="340">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#fff"/>
      <rect width="7" height="7" fill="#07c160"/>
      <rect x="9" y="9" width="7" height="7" fill="#07c160"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="320" height="340" rx="20" fill="#fff" stroke="#07c160" stroke-width="2"/>
  <!-- QR pattern simulation -->
  <rect x="24" y="24" width="272" height="272" rx="12" fill="url(#grid)" stroke="#07c160" stroke-width="1"/>
  <!-- Corner markers -->
  <rect x="20" y="20" width="40" height="40" rx="4" fill="none" stroke="#07c160" stroke-width="6"/>
  <rect x="20" y="20" width="24" height="24" fill="#07c160"/>
  <rect x="260" y="20" width="40" height="40" rx="4" fill="none" stroke="#07c160" stroke-width="6"/>
  <rect x="276" y="20" width="24" height="24" fill="#07c160"/>
  <rect x="20" y="260" width="40" height="40" rx="4" fill="none" stroke="#07c160" stroke-width="6"/>
  <rect x="20" y="276" width="24" height="24" fill="#07c160"/>
  <!-- Center icon -->
  <rect x="130" y="130" width="60" height="60" rx="8" fill="#07c160"/>
  <text x="160" y="168" text-anchor="middle" font-size="28" fill="#fff">微</text>
  <!-- Label -->
  <text x="160" y="318" text-anchor="middle" font-size="16" font-weight="bold" fill="#07c160">微信支付收款码</text>
  <text x="160" y="336" text-anchor="middle" font-size="10" fill="#999">请替换为真实收款码图片</text>
</svg>
